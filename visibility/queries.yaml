# StatCan AI/Search Visibility Study — pilot query bank
#
# Purpose: a representative bank of real-world questions in five StatCan subject
# areas (labour; digital economy and society; society and community; immigration
# and ethnocultural diversity; population and demography), used to audit
# whether popular search engines and AI answer engines cite Statistics Canada,
# and whether StatCan *could* have answered (see docs/visibility.md).
#
# Fields per query:
#   id       — stable identifier (LAB/DIG/SOC + number)
#   query    — the question as a user would type/ask it
#   source   — autocomplete (real Google autocomplete phrasing, July 2026)
#              | curated (constructed to probe a specific gap)
#   intent   — point (single current number) | trend | comparison
#              | disaggregated (breakdown by sociodemographic/geo group)
#              | integration (needs variables crossed from >1 dataset)
#   probe    — optional: which underutilization mechanism this query tests
#              (unpublished_indicator | shallow_disaggregation | no_integration)
#   answerable — goal-2 coding (2026-07-18, vs WDS cube list of 8,212 cubes):
#              fully (current published table at needed granularity)
#              | partially (indicator exists but stale, discontinued, wrong
#                granularity, or split across sources)
#              | microdata_only (collected but published only in one-off
#                articles/analysis, no standing table)
#              | not_collected (not a StatCan indicator; another org owns it)
#   candidate_table — PID(s) of best candidate cube(s); empty when none
#   note     — coding rationale where non-obvious
#
# Coding is PILOT-GRADE: title-based matching against getAllCubesListLite plus
# getCubeMetadata spot-checks (45100049, 45100095, 45100104). Single coder.
# Engine-audit results go to visibility/results/*.parquet, not here.

