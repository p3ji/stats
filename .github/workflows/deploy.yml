# Deploys the static site (repo root) to GitHub Pages on every push to main.
# Plain HTML/JS — no build step. index.html lives at repo root (not a subfolder)
# so it also works if Pages is ever switched to "Deploy from a branch" mode,
# which only supports the repo root or /docs as a source.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
